    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 120) rotate(22.4) scale(290 180)">
      <stop stop-color="#D1E2D7"/>
